name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14 # Apple Silicon (M1) runner

    # Skip CI when commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: version
        run: |
          # Read current version
          CURRENT=$(jq -r '.version' package.json)
          echo "Current version: $CURRENT"

          # Increment patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Update package.json
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.tmp && mv package.tmp package.json

          # Update tauri.conf.json
          jq --arg v "$NEW_VERSION" '.version = $v' src-tauri/tauri.conf.json > tauri.tmp && mv tauri.tmp src-tauri/tauri.conf.json

          # Update Cargo.toml
          sed -i '' "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

          # Sync Cargo.lock with new version
          cd src-tauri && cargo update -p linty && cd ..

      - name: Commit version bump
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: macos-aarch64
          cache-on-failure: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install yarn dependencies
        run: yarn install --frozen-lockfile

      - name: Import Apple certificate
        env:
          LINTY_APPLE_SIGNING_CERTIFICATE: ${{ secrets.LINTY_APPLE_SIGNING_CERTIFICATE }}
          LINTY_APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.LINTY_APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          # Decode certificate
          echo "$LINTY_APPLE_SIGNING_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$LINTY_APPLE_SIGNING_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build & notarize app
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Hari Shekhar (3RPKRQ84N3)"
          APPLE_ID: ${{ secrets.LINTY_APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.LINTY_APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.LINTY_APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.LINTY_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.LINTY_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: yarn tauri build --bundles dmg,app -- --features local-stt

      - name: Notarize & staple DMG
        env:
          APPLE_ID: ${{ secrets.LINTY_APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.LINTY_APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.LINTY_APPLE_TEAM_ID }}
        run: |
          DMG_PATH=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          echo "Notarizing DMG: $DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          echo "DMG notarized and stapled."

      - name: Generate latest.json for updater
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MACOS_DIR="src-tauri/target/release/bundle/macos"

          # Find the .app.tar.gz and .sig files generated by Tauri updater
          TAR_GZ=$(ls ${MACOS_DIR}/*.app.tar.gz 2>/dev/null | head -1)
          SIG_FILE=$(ls ${MACOS_DIR}/*.app.tar.gz.sig 2>/dev/null | head -1)

          if [ -z "$TAR_GZ" ] || [ -z "$SIG_FILE" ]; then
            echo "ERROR: Updater artifacts not found in ${MACOS_DIR}"
            ls -la ${MACOS_DIR}/ || true
            exit 1
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          TAR_GZ_NAME=$(basename "$TAR_GZ")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json <<EOF
          {
            "version": "v${VERSION}",
            "notes": "Linty v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/lintyai/linty/releases/download/v${VERSION}/${TAR_GZ_NAME}"
              }
            }
          }
          EOF

          echo "Generated latest.json for v${VERSION}"
          cat latest.json

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linty-macOS-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: main
          name: Linty v${{ steps.version.outputs.version }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            latest.json
          generate_release_notes: true
